name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ---- Stage 1: static checks + fast unit/API suite (the regression gate) ----
  quality:
    name: Typecheck + unit + API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit + API tests (coverage)
        run: npm run test:cov
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ---- Stage 2: production build ----
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stl_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Next build
        run: npm run build
      - name: Cache build output
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next/
          retention-days: 1

  # ---- Stage 3: E2E + accessibility against a real server + Postgres ----
  e2e:
    name: E2E + a11y
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stl_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stl_test
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Prepare database
        run: |
          npm run db:push
          npm run db:seed
      - name: Install Playwright browsers
        run: npm run test:e2e:install
      - name: Run E2E + axe
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ---- Stage 4: performance — Lighthouse budgets ----
  lighthouse:
    name: Lighthouse budgets
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stl_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stl_test
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run db:push && npm run db:seed
      - name: Build
        run: npm run build
      - name: Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun

  # ---- Stage 5: performance — k6 load test ----
  load:
    name: k6 load test
    runs-on: ubuntu-latest
    needs: build
    # Only gate on load results for pushes to main; keep PRs fast.
    if: github.event_name == 'push'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: stl_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/stl_test
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run db:push && npm run db:seed
      - name: Build + start server
        run: |
          npm run build
          npm run start &
          npx --yes wait-on http://localhost:3000 --timeout 120000
      - name: Install k6
        uses: grafana/setup-k6-action@v1
      - name: Run k6 load test
        run: k6 run tests/perf/coupon-load.js
        env:
          BASE_URL: http://localhost:3000
